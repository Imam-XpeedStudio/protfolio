<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imam Hosen Emon — Software Engineer (PHP / Laravel)</title>

  <meta name="author" content="Imam Hosen Emon" />

  <!-- Open Graph / social preview -->

  <meta property="og:description" content="Building large-scale ERP & SaaS systems. Hospital ERP · HRM · Payroll · Inventory · REST APIs · PHP / Laravel." />

  <!-- Inline SVG favicon: green terminal prompt -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e0c'/%3E%3Ctext x='5' y='23' font-family='monospace' font-size='18' fill='%2300ff9c'%3E%26gt;_%3C/text%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Devicon (tech logos) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

  <!-- Tailwind (Play CDN — no build step, GitHub-Pages friendly) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            term: {
              bg:     'rgb(var(--c-bg) / <alpha-value>)',
              panel:  'rgb(var(--c-panel) / <alpha-value>)',
              panel2: 'rgb(var(--c-panel2) / <alpha-value>)',
              border: 'rgb(var(--c-border) / <alpha-value>)',
              green:  'rgb(var(--c-green) / <alpha-value>)',
              dim:    'rgb(var(--c-dim) / <alpha-value>)',
              muted:  'rgb(var(--c-muted) / <alpha-value>)',
              text:   'rgb(var(--c-text) / <alpha-value>)',
              bright: 'rgb(var(--c-bright) / <alpha-value>)',
              amber:  'rgb(var(--c-amber) / <alpha-value>)',
            },
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- Set theme before first paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (t === 'light') document.documentElement.classList.add('light');
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="font-mono text-term-text antialiased selection:bg-term-green relative">

  <!-- Skip link (a11y) -->
  <a href="#hero" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:top-3 focus:left-3 focus:bg-term-green focus:text-term-bg focus:px-3 focus:py-1 focus:rounded">Skip to content</a>

  <!-- Matrix-rain background (toggled by the nav button) -->
  <canvas id="matrix" aria-hidden="true"></canvas>

  <!-- Each section lives in its own .html file (see /sections) and is loaded here -->
  <div data-include="sections/nav.html"></div>

  <main class="relative z-10">
    <div data-include="sections/hero.html"></div>
    <div data-include="sections/about.html"></div>
    <div data-include="sections/stack.html"></div>
    <div data-include="sections/experience.html"></div>
    <div data-include="sections/projects.html"></div>
    <div data-include="sections/education.html"></div>
    <div data-include="sections/contact.html"></div>
  </main>

  <div data-include="sections/footer.html"></div>

  <!-- Loader: pulls in the section files above, then runs js/app.js -->
  <script src="js/include.js"></script>
</body>
</html>
